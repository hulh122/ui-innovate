<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>UI Innovate — vm0</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #fafafa; color: #333; min-height: 100vh; }
    .header { background: #fff; border-bottom: 1px solid #e5e5e5; padding: 32px; }
    .header h1 { font-size: 24px; font-weight: 700; }
    .header p { color: #666; margin-top: 8px; font-size: 15px; line-height: 1.5; }
    .content { max-width: 800px; margin: 0 auto; padding: 32px; }
    .empty { text-align: center; padding: 80px 32px; color: #999; }
    .empty h2 { font-size: 18px; font-weight: 600; color: #666; margin-bottom: 12px; }
    .empty p { font-size: 14px; line-height: 1.6; }
    .empty code { background: #f0f0f0; padding: 2px 6px; border-radius: 4px; font-size: 13px; }
    .issue-list { list-style: none; }
    .issue-list li { background: #fff; border: 1px solid #e5e5e5; border-radius: 8px; margin-bottom: 12px; }
    .issue-list a { display: block; padding: 20px 24px; text-decoration: none; color: inherit; }
    .issue-list a:hover { background: #f8f8f8; }
    .issue-list .issue-number { color: #666; font-size: 14px; }
    .issue-list .issue-title { font-weight: 600; font-size: 16px; margin-top: 4px; }
    .footer { text-align: center; padding: 32px; color: #999; font-size: 13px; }
    .footer a { color: #666; }
  </style>
</head>
<body>
  <div class="header">
    <h1>UI Innovate</h1>
    <p>Design exploration for <a href="https://github.com/vm0-ai/vm0">vm0</a> GitHub issues. Each issue gets baseline snapshots and 3 design variants for human review.</p>
  </div>
  <div class="content">
    <ul class="issue-list">
      <li>
        <a href="issues/5930/">
          <span class="issue-number">#5930</span>
          <div class="issue-title">Schedule detail page with "Run Now" button</div>
        </a>
      </li>
    </ul>
  </div>
  <div class="footer">
    <a href="https://github.com/vm0-ai/ui-innovate">Source</a>
  </div>
</body>
</html>
